<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAlpha Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 550px; width: 100%; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        .total-box { background: #007bff; color: white; text-align: center; padding: 15px; border-radius: 8px; font-size: 22px; font-weight: bold; margin-bottom: 20px; }
        input, select { width: 95%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        button { background-color: #007bff; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0056b3; }
        .expense-list { max-width: 550px; width: 100%; }
        .expense-item { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #dc3545; }
        .expense-info { word-break: break-all; max-width: 70%; }
        .expense-name { font-weight: bold; font-size: 16px; color: #333; }
        .expense-meta { font-size: 13px; color: #777; margin-top: 3px; }
        .expense-amount { font-size: 18px; font-weight: bold; color: #dc3545; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-left: 10px;}
        .delete-btn:hover { background: #c82333; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Expense Tracker API</h2>
        
        <div class="total-box">Total Balance: Rs. <span id="totalAmount">0</span></div>

        <input type="text" id="expName" placeholder="Expense Name (e.g., Lunch)..." required>
        <input type="number" id="expAmount" placeholder="Amount (Rs.)..." required>
        
        <select id="expCategory">
            <option value="Food">Food</option>
            <option value="Bills">Bills</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Shopping">Shopping</option>
            <option value="Others">Others</option>
        </select>
        
        <input type="date" id="expDate" required>
        
        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="expense-list" id="expenseList">
        </div>

    <script>
        window.onload = fetchExpenses;

        async function fetchExpenses() {
            const response = await fetch('/api/expenses');
            const expenses = await response.json();
            
            const listDiv = document.getElementById('expenseList');
            const totalSpan = document.getElementById('totalAmount');
            
            listDiv.innerHTML = '';
            let total = 0;

            expenses.forEach(exp => {
                total += exp.amount;
                listDiv.innerHTML += `
                    <div class="expense-item">
                        <div class="expense-info">
                            <div class="expense-name">${exp.name}</div>
                            <div class="expense-meta">${exp.category} | ${exp.date}</div>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <div class="expense-amount">Rs. ${exp.amount}</div>
                            <button class="delete-btn" onclick="deleteExpense('${exp.id}')">Delete</button>
                        </div>
                    </div>
                `;
            });

            totalSpan.innerText = total;
        }

        async function addExpense() {
            const name = document.getElementById('expName').value;
            const amount = document.getElementById('expAmount').value;
            const category = document.getElementById('expCategory').value;
            const date = document.getElementById('expDate').value;

            if (!name || !amount || !date) return alert('Please fill in all fields');

            await fetch('/api/expenses', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, amount, category, date })
            });

            
            document.getElementById('expName').value = '';
            document.getElementById('expAmount').value = '';
            document.getElementById('expDate').value = '';
            fetchExpenses();
        }

        async function deleteExpense(id) {
            if (confirm('Are you sure you want to delete this expense?')) {
                await fetch(`/api/expenses/${id}`, { method: 'DELETE' });
                fetchExpenses();
            }
        }
    </script>
</body>
</html>
